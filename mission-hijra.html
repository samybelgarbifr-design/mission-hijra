<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Hijra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F0E8;
            color: #1B2A4A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 680px;
            width: 100%;
            padding: 48px 24px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Logo */
        .logo {
            width: 160px;
            margin-bottom: 36px;
        }

        .logo img {
            width: 100%;
            height: auto;
        }

        /* Badge association */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(197, 165, 74, 0.12);
            border: 1px solid rgba(197, 165, 74, 0.3);
            border-radius: 100px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 500;
            color: #9A7D2E;
            margin-bottom: 28px;
            letter-spacing: 0.01em;
        }

        .badge::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #C5A54A;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Headline */
        .headline {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 40px;
            letter-spacing: -0.02em;
            max-width: 580px;
        }

        .headline .gold {
            background: linear-gradient(135deg, #D4B44A 0%, #B8962E 50%, #D4B44A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Video */
        .video-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(27, 42, 74, 0.10);
            aspect-ratio: 16 / 9;
            background: #1B2A4A;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* CTA */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #D4B44A 0%, #B8962E 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 18px 44px;
            border-radius: 100px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 20px rgba(197, 165, 74, 0.35);
            letter-spacing: -0.01em;
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(197, 165, 74, 0.45);
        }

        .cta:active {
            transform: translateY(0);
        }

        .cta svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 36px 18px 48px;
            }

            .logo {
                width: 120px;
                margin-bottom: 28px;
            }

            .badge {
                font-size: 12px;
                padding: 7px 16px;
                margin-bottom: 22px;
            }

            .headline {
                font-size: 24px;
                margin-bottom: 32px;
            }

            .video-wrapper {
                margin-bottom: 32px;
                border-radius: 12px;
            }

            .cta {
                font-size: 16px;
                padding: 16px 36px;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <img src="Gemini_Generated_Image_si0qy1si0qy1si0q.png" alt="Mission Hijra">
        </div>

        <!-- Badge -->
        <div class="badge">Mission Hijra est une association à but non lucratif</div>

        <!-- Headline -->
        <h1 class="headline">
            Comment générer des revenus sur internet <span class="gold">pour enfin faire sa hijra</span>
        </h1>

        <!-- Vidéo YouTube -->
        <div class="video-wrapper">
            <!-- REMPLACER VIDEO_ID par l'ID de la vidéo YouTube -->
            <iframe
                src="https://www.youtube.com/embed/VIDEO_ID"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        <!-- CTA Telegram -->

        <a href="#" class="cta">
            <svg viewBox="0 0 24 24" fill="currentColor">

            </svg>
            Je rejoins le canal Telegram
        </a>

    </div>
</body>
</html>
